services:
  - type: web
    name: localbms-api
    runtime: node
    plan: free
    buildCommand: cd ../.. && pnpm install && pnpm --filter @localbms/shared build && pnpm --filter @localbms/api exec prisma generate && pnpm --filter @localbms/api build
    startCommand: cd apps/api && node dist/server.js
    healthCheckPath: /api/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
