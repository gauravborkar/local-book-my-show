# Supabase is the database — set DATABASE_URL in the Render dashboard for each service below.
# Use the Supabase Session pooler URL (port 5432) with ?sslmode=require

services:
  - type: web
    name: localbms-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm@9.15.0 && pnpm install --no-frozen-lockfile && pnpm --filter @localbms/shared build && pnpm --filter @localbms/api build
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /api/health/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        fromService:
          type: web
          name: localbms-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: localbms-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: MOCK_PAYMENTS
        value: "true"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    runtime: static
    name: localbms-web
    rootDir: .
    buildCommand: npm install -g pnpm@9.15.0 && pnpm install --no-frozen-lockfile && pnpm --filter @localbms/shared build && pnpm --filter @localbms/web build
    staticPublishPath: apps/web/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: localbms-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
